<!DOCTYPE html>
<html>
    <head>
        <title>Inline styles</title>
    </head>
    <body>
        <h1 style="background-color: greenyellow; font-size: 30px; color: red; color: yellowgreen;">Heading <span style="color: blue;">one</span></h1>
        <h2 style="font-size: 30px; color: aquamarine;">Heading 2</h2>
        <h3 style="font-size: 30px; color: red;">Heading 3</h3>
        <h4 style="font-size: 30px; color: darkgoldenrod;">Heading 4</h4>
        <h1 style="font-size: 20px; color: chocolate;">Heading 1</h1>
        <h2 style="font-size: 20px; color: darkgreen;">Heading 2</h2>
        <h3 style="font-size: 20px; color: darkviolet;">Heading 3</h3>
        <h4 style="font-size: 20px; color: lawngreen;">Heading 4</h4>
    </body>

</html>
